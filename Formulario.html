<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud de Crédito · CrediCoop</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bone:#f5f0e8;
  --bone-mid:#ede7d9;
  --bone-dark:#e0d8c8;
  --ink:#333333;
  --ink-mid:#555555;
  --muted:#888888;
  --border:#c8bfae;
  --border-light:#ddd6c8;
  --field-bg:rgba(255,255,255,0.55);
}
html{font-size:16px;}
body{
  background:var(--bone-mid);
  min-height:100vh;
  font-family:'Crimson Pro',Georgia,serif;
  color:var(--ink);
  padding:2rem 1rem 4rem;
}
.page{max-width:820px;margin:0 auto;}

/* HEADER */
.header{
  background:var(--ink);
  border-radius:6px 6px 0 0;
  padding:1.6rem 2rem 1.4rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:0.8rem;
}
.header h1{font-family:'IM Fell English',serif;font-size:1.7rem;color:var(--bone);letter-spacing:0.08em;line-height:1;}
.header p{font-size:0.62rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--bone-dark);opacity:0.6;margin-top:4px;}
.header-badge{font-family:'Crimson Pro',serif;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink);background:var(--bone);padding:0.3rem 0.9rem;border-radius:20px;white-space:nowrap;}

/* META BAR */
.meta-bar{
  background:var(--bone);
  border:1px solid var(--border-light);
  border-top:none;
  padding:0.9rem 2rem;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1rem;
}

/* FORM CARD */
.form-card{
  background:var(--bone);
  border:1px solid var(--border-light);
  border-top:none;
  border-radius:0 0 6px 6px;
  padding:2rem;
  box-shadow:0 6px 28px rgba(51,51,51,0.08);
}

/* SECTION */
.section{margin-bottom:2.4rem;}
.section-title{
  font-family:'IM Fell English',serif;
  font-size:1.05rem;
  color:var(--bone);
  background:var(--ink);
  padding:0.45rem 1rem;
  border-radius:3px;
  margin-bottom:1.4rem;
  letter-spacing:0.06em;
}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem 1.4rem;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem 1.4rem;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1rem 1.4rem;}
.s2{grid-column:span 2;}
.s3{grid-column:span 3;}
.s4{grid-column:span 4;}
.mt{margin-top:1rem;}

/* FIELD */
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);font-weight:600;}
.field input,.field select{
  background:transparent;border:none;border-bottom:1.5px solid var(--border);
  color:var(--ink);font-family:'Crimson Pro',serif;font-size:1rem;
  padding:8px 2px 6px;border-radius:0;-webkit-appearance:none;
  outline:none;transition:border-color 0.2s;width:100%;
}
.field input:focus,.field select:focus{border-bottom-color:var(--ink);}
.field input::placeholder{color:rgba(136,136,136,0.45);font-style:italic;}
.field select option{background:var(--bone);color:var(--ink);}

/* RADIO */
.rgroup{display:flex;flex-direction:column;gap:4px;}
.rgroup .rl{font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);font-weight:600;}
.rrow{display:flex;gap:1.2rem;flex-wrap:wrap;padding-top:6px;}
.rrow label{display:flex;align-items:center;gap:5px;font-family:'Crimson Pro',serif;font-size:0.97rem;color:var(--ink);cursor:pointer;}
.rrow input[type="radio"]{accent-color:var(--ink);width:13px;height:13px;cursor:pointer;}

/* DIVIDER */
hr{border:none;border-top:1px solid var(--border-light);margin:1.2rem 0;}

/* REFERENCES */
.ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;}
.ref-card{background:rgba(255,255,255,0.4);border:1px solid var(--border-light);border-radius:4px;padding:1.1rem 1.2rem;}
.ref-label{font-family:'IM Fell English',serif;font-size:0.9rem;color:var(--ink-mid);border-bottom:1px dashed var(--border);padding-bottom:6px;margin-bottom:1rem;}

/* FOOTER */
.footer{display:flex;justify-content:flex-end;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border-light);}
.btn-pdf{
  font-family:'Crimson Pro',serif;font-size:1rem;letter-spacing:0.1em;text-transform:uppercase;
  background:var(--ink);color:var(--bone);border:none;padding:0.7rem 2rem;
  border-radius:4px;cursor:pointer;transition:background 0.18s,transform 0.18s;
  box-shadow:0 2px 10px rgba(51,51,51,0.18);
}
.btn-pdf:hover{background:#111;transform:translateY(-1px);}

/* TOAST */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  background:rgba(51,51,51,0.93);color:var(--bone);
  font-family:'Crimson Pro',serif;font-size:0.9rem;
  padding:10px 22px;border-radius:20px;border:1px solid rgba(200,191,174,0.3);
  white-space:nowrap;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.toast.show{opacity:1;}

/* RESPONSIVE */
@media(max-width:600px){
  body{padding:0.5rem 0.4rem 3rem;}
  .header{padding:1.1rem 1rem;}
  .meta-bar{grid-template-columns:1fr 1fr;padding:0.8rem 1rem;}
  .form-card{padding:1rem;}
  .g2,.g3,.g4{grid-template-columns:1fr;}
  .s2,.s3,.s4{grid-column:span 1;}
  .ref-grid{grid-template-columns:1fr;}
}
@media(min-width:601px) and (max-width:820px){
  .meta-bar{grid-template-columns:1fr 1fr;}
  .g4{grid-template-columns:1fr 1fr;}
  .g3{grid-template-columns:1fr 1fr;}
  .s4{grid-column:span 2;}
  .s3{grid-column:span 2;}
}
</style>
</head>

<script>
const gv=id=>{const el=document.getElementById(id);if(!el)return'';return(el.value!==undefined?el.value:el.textContent).trim();};
const gr=name=>{const el=document.querySelector(`input[name="${name}"]:checked`);return el?el.value:'—';};
const fd=iso=>{if(!iso)return'—';const[y,m,d]=iso.split('-');const ms=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];return`${parseInt(d)} de ${ms[parseInt(m)-1]} de ${y}`;};

function descargarPDF(){
  const nombres=gv('nombres')||'—',apellidos=gv('apellidos')||'—',cc=gv('cc')||'—';
  const dirRes=gv('dir_res')||'—',barrioRes=gv('barrio_res')||'—',ciudadRes=gv('ciudad_res')||'—';
  const telefono=gv('telefono')||'—',correo=gv('correo')||'—';
  const estadoCivil=gv('estado_civil')||'—',vivienda=gr('vivienda');
  const conyuge=gv('conyuge'),actConyuge=gv('actividad_conyuge');
  const empresa=gv('empresa')||'—',dirLab=gv('dir_lab')||'—';
  const barrioLab=gv('barrio_lab')||'—',ciudadLab=gv('ciudad_lab')||'—';
  const telLab=gv('tel_lab')||'—',cargo=gv('cargo')||'—',area=gv('area')||'—';
  const ingreso=gv('ingreso')||'—',tipoIngreso=gr('tipoIngreso');
  const r1n=gv('r1_nombre')||'—',r1p=gv('r1_parentesco')||'—',r1t=gv('r1_tel')||'—',r1d=gv('r1_dir')||'—',r1b=gv('r1_barrio')||'—',r1c=gv('r1_ciudad')||'—';
  const r2n=gv('r2_nombre')||'—',r2p=gv('r2_parentesco')||'—',r2t=gv('r2_tel')||'—',r2d=gv('r2_dir')||'—',r2b=gv('r2_barrio')||'—',r2c=gv('r2_ciudad')||'—';
  const r3n=gv('r3_nombre')||'—',r3p=gv('r3_parentesco')||'—',r3t=gv('r3_tel')||'—',r3d=gv('r3_dir')||'—',r3b=gv('r3_barrio')||'—',r3c=gv('r3_ciudad')||'—';
  const r4n=gv('r4_nombre')||'—',r4p=gv('r4_parentesco')||'—',r4t=gv('r4_tel')||'—',r4d=gv('r4_dir')||'—',r4b=gv('r4_barrio')||'—',r4c=gv('r4_ciudad')||'—';
  const codigo=gv('codigo')||'—';
  const fechaStr=fd(gv('fecha')),fechaInicioStr=fd(gv('fechaInicio')),fechaPagoStr=fd(gv('fechaPago'));
  const conyugeRow=conyuge?`<tr><td class="lbl">Cónyuge</td><td class="val">${conyuge}</td><td class="lbl">Actividad</td><td class="val">${actConyuge||'—'}</td></tr>`:'';
  const nombreArchivo='Solicitud_'+(nombres+apellidos).replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g,'').trim().replace(/\s+/g,'_');

  const html=`<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>${nombreArchivo}</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:210mm;margin:0 auto;background:#f5f0e8;}
body{font-family:'Crimson Pro',Georgia,serif;font-size:10pt;color:#333;padding:12mm 14mm 10mm;line-height:1.7;}
.doc{background:#fdf9f4;border:1.5px solid #c8bfae;padding:22px 26px 20px;position:relative;}
.corner{position:absolute;font-size:13pt;opacity:.2;pointer-events:none;color:#333;}
.corner.tl{top:8px;left:12px;}.corner.tr{top:8px;right:12px;transform:scaleX(-1);}
.corner.bl{bottom:8px;left:12px;transform:scaleY(-1);}.corner.br{bottom:8px;right:12px;transform:scale(-1);}
.top{text-align:center;border-bottom:1px solid #c8bfae;padding-bottom:12px;margin-bottom:14px;}
.meta-row{display:flex;justify-content:space-between;font-size:7pt;color:#888;margin-bottom:8px;}
h1{font-family:'IM Fell English',Georgia,serif;font-size:22pt;color:#333;letter-spacing:2px;line-height:1;}
.subtit{font-size:6pt;letter-spacing:3px;text-transform:uppercase;color:#888;margin-top:4px;}
.sec-title{font-family:'IM Fell English',serif;font-size:11pt;color:#f5f0e8;background:#333;padding:4px 10px;border-radius:2px;margin:14px 0 10px;letter-spacing:.5px;}
table{width:100%;border-collapse:collapse;margin-bottom:4px;}
td{padding:4px 6px;vertical-align:top;}
td.lbl{width:28%;font-size:7pt;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:600;padding-top:6px;}
td.val{font-size:10pt;color:#333;border-bottom:1px solid rgba(200,191,174,.5);font-style:italic;}
td.val.accent{color:#333;font-weight:600;font-style:normal;}
.tag{display:inline-block;background:rgba(51,51,51,.08);border:1px solid rgba(51,51,51,.2);border-radius:3px;padding:1px 8px;font-size:9pt;font-style:normal;}
.ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px;}
.ref-box{background:rgba(245,240,232,.6);border:1px dashed #c8bfae;border-radius:4px;padding:10px 12px;}
.ref-num{font-size:6.5pt;letter-spacing:.18em;text-transform:uppercase;color:#555;margin-bottom:8px;font-weight:700;}

.firma-bloque{text-align:center;}

.print-btn{display:block;margin:18px auto 0;padding:10px 30px;background:#333;color:#f5f0e8;border:none;border-radius:4px;font-family:'Crimson Pro',serif;font-size:11pt;letter-spacing:1px;cursor:pointer;}
@media print{html,body{width:100%;padding:8mm 10mm;}.print-btn{display:none!important;}}

<div class="doc">
  <span class="corner tl">❧</span><span class="corner tr">❧</span>
  <span class="corner bl">❧</span><span class="corner br">❧</span>
  <div class="top">
    <div class="meta-row"><span>Fecha: <b>${fechaStr}</b></span><span>Código: <b>${codigo}</b></span></div>
